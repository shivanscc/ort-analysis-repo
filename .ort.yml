excludes:
  paths:
    - pattern: "**/src/*/test/**"
      reason: "TEST_OF"
      comment: "Unit test files"
    - pattern: "**/tests/**"
      reason: "TEST_OF"
      comment: "Test suite files"
    - pattern: "**/spec/**"
      reason: "TEST_OF"
      comment: "Specification/test files"
    - pattern: "**/.test/**"
      reason: "TEST_OF"
      comment: "Hidden test directories"
    - pattern: "*/package-managers/cocoapods/**"
      reason: "OTHER"
      comment: "Conflicting OTP project test assets"
    - pattern: "src/erlang/**"
      reason: "OTHER"
      comment: "Erlang/Rebar3 sources excluded; Mix is the enabled package manager for this repository"

analyzer:
  skipExcluded: true
  disabledPackageManagers:
    - Rebar3
